<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle limit (not drawn) just for centering context -->
  <!-- Radiating lines (alternating long and short) -->
  <g stroke="#78BEB5" stroke-width="0.8">
    <line x1="100" y1="20" x2="100" y2="85" />
    <line x1="100" y1="180" x2="100" y2="115" />
    <line x1="20" y1="100" x2="85" y2="100" />
    <line x1="180" y1="100" x2="115" y2="100" />

    <line x1="43" y1="43" x2="89" y2="89" />
    <line x1="157" y1="157" x2="111" y2="111" />
    <line x1="157" y1="43" x2="111" y2="89" />
    <line x1="43" y1="157" x2="89" y2="111" />
  </g>

  <!-- Central circle (NO fill) -->
  <circle cx="100" cy="100" r="15" fill="none" stroke="#78BEB5" stroke-width="1" />

  <!-- Inner circle -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#C27230" stroke-width="1" />

  <!-- Crescents/Moons inside inner circle -->
  <path d="M96 95 C98 97, 98 103, 96 105 C94 103, 94 97, 96 95 Z" fill="#C27230" fill-opacity="0.5" />
  <path d="M104 95 C102 97, 102 103, 104 105 C106 103, 106 97, 104 95 Z" fill="#C27230" fill-opacity="0.5" />

  <!-- Cardinal points (top, bottom, left, right) -->
  <circle cx="100" cy="20" r="2.5" fill="#78BEB5" />
  <circle cx="100" cy="180" r="2.5" fill="#78BEB5" />
  <circle cx="20" cy="100" r="2.5" fill="#78BEB5" />
  <circle cx="180" cy="100" r="2.5" fill="#78BEB5" />

  <!-- Diagonal points -->
  <circle cx="43" cy="43" r="1.5" fill="#78BEB5" fill-opacity="0.5" />
  <circle cx="157" cy="157" r="1.5" fill="#78BEB5" fill-opacity="0.5" />
  <circle cx="157" cy="43" r="1.5" fill="#78BEB5" fill-opacity="0.5" />
  <circle cx="43" cy="157" r="1.5" fill="#78BEB5" fill-opacity="0.5" />
</svg>
